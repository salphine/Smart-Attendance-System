# docker-compose.prod.yml
version: '3.8'

services:
  fastapi-backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./models:/app/models
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/attendance
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models
      - ENVIRONMENT=production
    deploy:
      replicas: 3
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - embu-network
    depends_on:
      - postgres
      - redis

  streamlit-frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - API_URL=http://fastapi-backend:8000
      - OFFLINE_MODE=true
    deploy:
      replicas: 2
    networks:
      - embu-network
    depends_on:
      - fastapi-backend

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=attendance
      - POSTGRES_USER=embu_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - embu-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - embu-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - embu-network
    depends_on:
      - fastapi-backend
      - streamlit-frontend

volumes:
  postgres_data:
  redis_data:

networks:
  embu-network:
    driver: bridge